<!DOCTYPE html>
{% load static %}
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troca obrigatoria de senha | I9TMG ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --azul-principal: #141C3C;
            --laranja-principal: #FF742E;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .auth-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-image: url('{% static "img/background_tech.png" %}');
            background-size: cover;
            background-position: center;
            padding: 24px;
        }
        .auth-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background-color: rgba(20, 28, 60, 0.7);
            box-shadow: inset 0 0 150px rgba(0,0,0,0.6);
        }
        .auth-card {
            max-width: 520px;
            width: 100%;
            background-color: rgba(255,255,255,0.96);
            border-radius: 1rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            padding: 3rem;
            position: relative;
            z-index: 1;
        }
        .btn-primary-i9 {
            background-color: var(--laranja-principal);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 700;
            padding: 0.9rem;
        }
        .btn-primary-i9:hover {
            background-color: #e66928;
            color: white;
        }
        .form-control:focus {
            border-color: var(--laranja-principal);
            box-shadow: 0 0 0 0.25rem rgba(255, 116, 46, 0.25);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <img src="{% static 'img/logo_card_i9tmg.png' %}" alt="Logo I9TMG" class="img-fluid bg-white rounded-3 p-2 shadow-sm" style="max-height: 130px; width: auto; object-fit: contain;">
            </div>

            <h1 class="h4 fw-bold mb-2">Troca obrigatoria de senha</h1>
            <p class="text-muted mb-4">Defina uma nova senha para continuar acessando o sistema.</p>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-{{ message.tags|default:'info' }}{% endif %} border-0 shadow-sm" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" action="{% url 'trocar_senha_obrigatoria' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="nova_senha" class="form-label fw-bold text-secondary small text-uppercase">Nova senha</label>
                    <div class="input-group shadow-sm rounded-3">
                        <span class="input-group-text bg-white border-end-0 text-muted px-3">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" name="nova_senha" id="nova_senha" class="form-control border-start-0 ps-0" autocomplete="new-password" required autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="confirmar_senha" class="form-label fw-bold text-secondary small text-uppercase">Confirmar nova senha</label>
                    <div class="input-group shadow-sm rounded-3">
                        <span class="input-group-text bg-white border-end-0 text-muted px-3">
                            <i class="bi bi-shield-lock"></i>
                        </span>
                        <input type="password" name="confirmar_senha" id="confirmar_senha" class="form-control border-start-0 ps-0" autocomplete="new-password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary-i9 w-100">
                    Salvar nova senha
                    <i class="bi bi-check2-circle ms-2"></i>
                </button>
            </form>

            <form method="post" action="{% url 'logout' %}" class="mt-3 text-center">
                {% csrf_token %}
                <button type="submit" class="btn btn-link text-secondary text-decoration-none">Sair</button>
            </form>
        </div>
    </div>
</body>
</html>
